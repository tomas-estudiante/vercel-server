<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSA</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="images/favicon.ico" sizes="any">
</head>

<body>
  <div class="wrapper">
    <div class="banner" id="mainBanner" style="height: 567px;"></div>
    <header>
      <div class="header" id="Recommendation"></div>
      <div class="mask-bg"></div>
    </header>
    <div class="searchmain">
      <div class="page-title">
        <img src="images/logo.png" alt="PSA">
      </div>
      <div class="search-tab-content search-form cur">
        <div class="input-box clearfix">
          <div class="search-input-wrap">
            <textarea class="search-input" id="txt_SearchText" name="txt_SearchText" type="text" autocomplete="off"
              placeholder="请输入检索内容" maxlength="500" rows="2"></textarea>
          </div>
          <div>
            <div class="search-btn" id="btn_search" style="color: rgb(255, 255, 255);"><i class="sprite-icon"></i>检索
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/index.js"></script>
</body>

</html>
